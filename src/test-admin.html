<!doctype html>
<html>
  <head>
    <title>Admin Notification Test</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  </head>
  <body>
    <h1>Waiting for Orders...</h1>
    <ul id="notifications"></ul>

    <script>
      const SOCKET_URL =
        process.env.NEXT_PUBLIC_SOCKET_URL || 'http://localhost:3000';

      const socket = io(SOCKET_URL, {
        transports: ['websocket'], // Recommended for performance in Next.js
      });

      socket.on('connect', () => {
        console.log('Connected to Server!');
      });

      socket.on('newOrder', (data) => {
        console.log('New Order Received:', data);
        const list = document.getElementById('notifications');
        const item = document.createElement('li');
        item.innerHTML = `<strong>New Order!</strong> ID: ${data.id} - Table: ${data.tableId}`;
        list.appendChild(item);

        // Play a sound to mimic a real POS
        new Audio(
          'https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3',
        ).play();
      });
    </script>
  </body>
</html>
